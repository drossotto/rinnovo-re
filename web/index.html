<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rinnovo RE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Favicon set generated by favicon.io -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="favicon_io/favicon.ico"
    />
    <link rel="manifest" href="favicon_io/site.webmanifest" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        /* shell theme defaults (light) */
        --shell-bg: #f9fafb;
        --shell-footer-bg: #ffffff;
        --shell-footer-border: #e5e7eb;
        --shell-footer-text: #6b7280;

        background: var(--shell-bg);
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        display: flex;
        flex-direction: column;
      }

      body[data-theme="dark"] {
        --shell-bg: #020617;
        --shell-footer-bg: #050816;
        --shell-footer-border: #1f2937;
        --shell-footer-text: #9ca3af;
        color: #e5e7eb;
      }

      rinnovo-root {
        display: block;
        flex: 1 0 auto;
      }

      footer {
        border-top: 1px solid var(--shell-footer-border);
        background: var(--shell-footer-bg);
        padding: 0.9rem 1.5rem;
        font-size: .75rem;
        color: var(--shell-footer-text);
        text-align: center;
      }

      .footer-inner {
        max-width: 1120px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .footer-actions {
        text-align: right;
        font-size: 1rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .footer-actions a {
        color: inherit;
        text-decoration: none;
      }

      .footer-actions a:hover {
        text-decoration: underline;
      }

      .footer-divider {
        width: 1px;
        height: 1rem;
        background: var(--shell-footer-text);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <rinnovo-root></rinnovo-root>
    <footer>
      <div class="footer-inner">
        <span>Copyright &copy; 2026 Rinnovo Technologies LLC</span>
        <span class="footer-actions">
          <a href="https://github.com/drossotto/rinnovo-re" target="_blank" rel="noopener noreferrer">
            <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub" style="height: 1.5rem; width: 1.5rem;" />
          </a>
          <span class="footer-divider" aria-hidden="true"></span>
          <a href="mailto:rinnovo.hardware@gmail.com">Contact</a>
        </span>
      </div>
    </footer>
    <script>
      (function () {
        function applyShellTheme(theme) {
          document.body.dataset.theme = theme === "dark" ? "dark" : "light";
        }

        // Default to light to match landing page
        applyShellTheme("light");

        window.addEventListener("message", function (event) {
          var data = event.data || {};
          if (data && data.type === "rinnovo-theme") {
            applyShellTheme(data.theme);
          }
        });

        class RinnovoRoot extends HTMLElement {
          constructor() {
            super();
            this.attachShadow({ mode: "open" });
            this._route = this._route.bind(this);
          }

          connectedCallback() {
            window.addEventListener("hashchange", this._route);
            this._route();
          }

          disconnectedCallback() {
            window.removeEventListener("hashchange", this._route);
          }

          _route() {
            const hash = window.location.hash || "#landing";
            let page;
            if (hash === "#console") {
              page = "pages/console.html";
            } else if (hash === "#install") {
              page = "pages/install.html";
            } else {
              page = "pages/landing.html";
            }
            this._renderFrame(page);
          }

          _renderFrame(src) {
            this.shadowRoot.innerHTML = `
              <style>
                :host {
                  display: block;
                  height: 100%;
                }
                iframe {
                  border: 0;
                  width: 100%;
                  height: 100%;
                }
              </style>
              <iframe src="${src}" title="Rinnovo"></iframe>
            `;
          }
        }

        customElements.define("rinnovo-root", RinnovoRoot);
      })();
    </script>
  </body>
</html>
