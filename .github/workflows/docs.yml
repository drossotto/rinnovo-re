name: Docs

on:
  push:
    branches: [ main, master ]
    paths:
      - "mkdocs.yml"
      - "docs/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: |
          pip install zensical mkdocs-material

      - name: Build docs
        run: zensical build
